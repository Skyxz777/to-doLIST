<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>To-Do List Inteligente</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: linear-gradient(135deg, #667eea, #764ba2);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .container {
      background: white;
      padding: 30px;
      border-radius: 15px;
      width: 420px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
      color: #333;
    }

    .form {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    input, select, button {
      padding: 12px;
      border-radius: 8px;
      border: 1px solid #ccc;
      font-size: 16px;
    }

    button {
      background: #667eea;
      color: white;
      cursor: pointer;
      border: none;
      transition: 0.3s;
    }

    button:hover {
      background: #5563d1;
    }

    ul {
      list-style: none;
      margin-top: 20px;
    }

    li {
      padding: 12px;
      margin-bottom: 10px;
      border-radius: 8px;
      color: white;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 10px;
    }

    .info-tarefa {
      display: flex;
      flex-direction: column;
      flex: 1;
    }

    .texto-tarefa {
      font-weight: bold;
    }

    .data-hora {
      font-size: 12px;
      margin-top: 4px;
      opacity: 0.9;
    }

    .alta {
      background: #e74c3c;
    }

    .media {
      background: #f39c12;
    }

    .baixa {
      background: #2ecc71;
    }

    .concluida {
      text-decoration: line-through;
      opacity: 0.6;
    }

    .acoes {
      display: flex;
      gap: 5px;
    }

    .acoes button {
      padding: 6px 10px;
      font-size: 14px;
    }

    .btn-concluir {
      background: #27ae60;
    }

    .btn-excluir {
      background: #c0392b;
    }
  </style>
</head>

<body>

<div class="container">
  <h1>📝 To-Do List</h1>

  <div class="form">
    <input type="text" id="tarefa" placeholder="Digite sua tarefa">

    <select id="prioridade">
      <option value="alta">Alta</option>
      <option value="media">Média</option>
      <option value="baixa">Baixa</option>
    </select>

    <!-- NOVA OPÇÃO -->
    <input type="date" id="data">
    <input type="time" id="hora">

    <button onclick="adicionarTarefa()">Adicionar</button>
  </div>

  <ul id="lista"></ul>
</div>

<script>
function adicionarTarefa() {
  const input = document.getElementById("tarefa");
  const prioridade = document.getElementById("prioridade").value;
  const data = document.getElementById("data").value;
  const hora = document.getElementById("hora").value;
  const lista = document.getElementById("lista");

  if (input.value.trim() === "") {
    alert("Digite uma tarefa!");
    return;
  }

  let dataHoraTexto = "";

  if (data || hora) {
    const partes = data ? data.split("-") : [];
    const dataFormatada = data
      ? `${partes[2]}/${partes[1]}/${partes[0]}`
      : "";

    dataHoraTexto = `${dataFormatada} ${hora}`.trim();
  }

  const li = document.createElement("li");
  li.classList.add(prioridade);

  li.innerHTML = `
    <div class="info-tarefa">
      <span class="texto-tarefa">${input.value}</span>
      ${dataHoraTexto ? `<span class="data-hora">📅 ${dataHoraTexto}</span>` : ""}
    </div>

    <div class="acoes">
      <button class="btn-concluir" onclick="concluir(this)">✔</button>
      <button class="btn-excluir" onclick="excluir(this)">✖</button>
    </div>
  `;

  lista.appendChild(li);

  input.value = "";
  document.getElementById("data").value = "";
  document.getElementById("hora").value = "";
}

function concluir(botao) {
  botao.parentElement.parentElement.classList.toggle("concluida");
}

function excluir(botao) {
  botao.parentElement.parentElement.remove();
}
</script>

</body>
</html>
